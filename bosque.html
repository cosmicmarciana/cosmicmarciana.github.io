<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Entre los árboles</title>
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#00ff00">
<link rel="icon" href="favicon.ico">

<style>
:root{
  --ink:#f6f2e9;
  --muted:#f0eadf;

  --v-bri: 0.92;
  --v-sat: 0.95;
  --v-con: 1.06;
  --v-zoom: 1.045;
  --v2-alpha: .34;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  color:var(--ink);
  font-family:Arial, sans-serif;
  background:#000;
}

/* ===== VIDEO ===== */
.bg{
  position:fixed;
  inset:0;
  z-index:-2;
}

.bg video{
  position:absolute;
  inset:-3%;
  width:106%;
  height:106%;
  object-fit:cover;
  transform: scale(var(--v-zoom));
  filter: brightness(var(--v-bri)) saturate(var(--v-sat)) contrast(var(--v-con));
}

#v2{
  opacity: var(--v2-alpha);
  mix-blend-mode: overlay;
}

/* ===== FX ===== */
.grain{
  position:fixed;
  inset:0;
  z-index:1;
  pointer-events:none;
  opacity:.12;
  mix-blend-mode: overlay;
}

.vignette{
  position:fixed;
  inset:0;
  z-index:2;
  pointer-events:none;
  background:radial-gradient(circle, rgba(0,0,0,0) 45%, rgba(0,0,0,.4) 85%);
}

/* ===== CONTENIDO ===== */
.wrap{
  position:relative;
  z-index:5;
  text-align:center;
}

.text{
  font-size:16px;
  color:var(--muted);
  text-shadow:0 0 20px rgba(0,0,0,.5);
}

.into{
  font-weight:700;
  letter-spacing:.2em;
  color:var(--ink);
}

#breath-btn{
  margin-top:20px;
  font-size:11px;
  letter-spacing:.22em;
  padding:10px 18px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.25);
  background:rgba(0,0,0,.16);
  color:var(--muted);
  cursor:pointer;
  animation: breathing 7s infinite ease-in-out;
}

@keyframes breathing {
  0% { transform: scale(1); opacity: 0.65; }
  50% { transform: scale(1.06); opacity: 1; }
  100% { transform: scale(1); opacity: 0.65; }
}

/* ===== BOTTOM ===== */
.bottom{
  position:fixed;
  bottom:22px;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
}

.bottom a{
  display:inline-block;
  margin-bottom:14px;
  font-size:12px;
  letter-spacing:.24em;
  color:rgba(246,242,233,.95);
  text-decoration:none;
  text-shadow:
    0 0 6px rgba(0,0,0,.9),
    0 0 16px rgba(0,0,0,.7);
}

.sig{
  font-size:11px;
  letter-spacing:.18em;
  color:rgba(246,242,233,.9);
  text-shadow:
    0 0 6px rgba(0,0,0,.9),
    0 0 16px rgba(0,0,0,.7);
}

/* ✨ GLOW SOLO CUANDO SUENA */
.bottom.is-playing a,
.bottom.is-playing .sig{
  animation: signal-glow 4s ease-in-out infinite;
}

@keyframes signal-glow{
  0%,100%{
    opacity:.8;
    text-shadow:
      0 0 6px rgba(0,0,0,.9),
      0 0 14px rgba(246,242,233,.3);
  }
  50%{
    opacity:1;
    text-shadow:
      0 0 8px rgba(0,0,0,.95),
      0 0 28px rgba(246,242,233,.7);
  }
}
</style>
</head>

<body>

<div class="bg">
  <video id="v1" autoplay muted loop playsinline>
    <source src="lava.mp4" type="video/mp4">
  </video>
  <video id="v2" autoplay muted loop playsinline>
    <source src="super8.mp4" type="video/mp4">
  </video>
</div>

<div class="grain"></div>
<div class="vignette"></div>

<main class="wrap">
  <p class="text">
    <span class="into">entre los árboles</span><br>
    el mundo se para
  </p>

  <button id="breath-btn">respira</button>
</main>

<div class="bottom" id="bottom">
  <a href="index.html">← regresa al ruido</a>
  <div class="sig">COSMIC MARCIANA 2026 · AMOR · PAZ · SEÑAL</div>
</div>

<audio id="bg-audio" loop>
  <source src="respira2.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById('bg-audio');
const btn = document.getElementById('breath-btn');
const bottom = document.getElementById('bottom');

let playing = false;

btn.addEventListener('click', () => {
  if(!playing){
    audio.play().catch(()=>{});
    bottom.classList.add('is-playing'); // ✨ activa glow
    btn.textContent = "silencio";
    playing = true;
  } else {
    audio.pause();
    bottom.classList.remove('is-playing'); // ✨ apaga glow
    btn.textContent = "respira";
    playing = false;
  }
});
</script>

</body>
</html>
