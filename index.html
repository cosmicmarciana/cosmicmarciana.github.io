<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>COSMIC MARCIANA</title>

<style>
body{
    margin:0;
    background:#050303;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    color:white;
    overflow:hidden;
}

/* ESPIRAL */
body::before{
    content:"";
    position:absolute;
    top:50%;left:50%;
    width:300vmax;height:300vmax;
    background:repeating-conic-gradient(#050303 0 15deg,#1a1412 15deg 30deg);
    animation:spin 40s linear infinite;
    transform:translate(-50%,-50%);
    z-index:-1;
}

@keyframes spin{
    to{transform:translate(-50%,-50%) rotate(360deg);}
}

/* CONTENEDOR */
#main{
    width:85%;
    max-width:450px;
    text-align:center;
}

/* GLITCH REAL (SIN RECARGAS) */
.glitch{
    position:relative;
    overflow:hidden;
}

.glitch img{
    width:100%;
    display:block;
}

/* duplicados reales */
.glitch img.clone{
    position:absolute;
    top:0;
    left:0;
    pointer-events:none;
    mix-blend-mode:screen;
}

/* capas */
.red{ transform:translate(2px,0); filter:hue-rotate(90deg); }
.blue{ transform:translate(-2px,0); filter:hue-rotate(-90deg); }

/* animación */
@keyframes slice1{
    0%{clip-path:inset(10% 0 80% 0);}
    50%{clip-path:inset(40% 0 40% 0);}
    100%{clip-path:inset(0 0 0 0);}
}

@keyframes slice2{
    0%{clip-path:inset(70% 0 10% 0);}
    50%{clip-path:inset(20% 0 60% 0);}
    100%{clip-path:inset(0 0 0 0);}
}

.red{ animation:slice1 1.5s infinite; }
.blue{ animation:slice2 1.2s infinite; }

h1{
    font-size:1.1rem;
    letter-spacing:10px;
    opacity:.7;
    margin-top:20px;
}
</style>
</head>

<body>

<div id="main">
    <div class="glitch">
        <img src="portada.webp" id="base">
        <img src="portada.webp" class="clone red">
        <img src="portada.webp" class="clone blue">
    </div>
    <h1>PRÓXIMAMENTE</h1>
</div>

</body>
</html>
