<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>PRÓXIMAMENTE</title>
    
    <!-- Esto asegura que la imagen cargue rápido -->
    <link rel="preload" as="image" href="portada.jpg">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #050303;
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            color: white;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        /* TU ESPIRAL SIGUE IGUAL */
        body::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300vmax; 
            height: 300vmax;
            background: repeating-conic-gradient(
                from 0deg,
                #050303 0deg 15deg,
                #1a1412 15deg 30deg
            );
            animation: spiral 30s linear infinite;
            z-index: -1;
            transform: translate(-50%, -50%);
        }

        @keyframes spiral {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: rotate(360deg) translate(-50%, -50%); }
        }

        .container {
            text-align: center;
            width: 85%;
            max-width: 450px; 
            z-index: 10;
            /* Solo cambia esto: empieza invisible */
            opacity: 0;
            transition: opacity 0.4s ease-in;
        }

        /* Clase que se activa al cargar */
        .container.loaded {
            opacity: 1;
        }

        .glitch-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 30px;
            box-shadow: 0 0 80px rgba(0,0,0,0.8);
            line-height: 0;
        }

        .portada {
            width: 100%;
            height: auto;
            display: block;
            animation: shake 0.3s infinite ease-in-out;
        }

        .glitch-wrapper::before,
        .glitch-wrapper::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('portada.jpg') no-repeat center;
            background-size: cover;
            opacity: 0.6;
            pointer-events: none;
        }

        .glitch-wrapper::before {
            animation: glitch-total 2s infinite linear alternate-reverse;
            filter: hue-rotate(90deg);
            left: 3px;
        }

        .glitch-wrapper::after {
            animation: glitch-total 1.5s infinite linear alternate;
            filter: hue-rotate(-90deg);
            left: -3px;
        }

        h1 {
            font-size: clamp(1rem, 4vw, 1.3rem); 
            text-transform: uppercase;
            letter-spacing: 10px;
            margin: 0;
            opacity: 0.6;
        }

        @keyframes glitch-total {
            0% { clip-path: inset(10% 0 80% 0); transform: translate(-2px); }
            50% { clip-path: inset(30% 0 35% 0); transform: translate(-4px); }
            100% { clip-path: inset(5% 0 85% 0); transform: translate(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translate(0); }
            50% { transform: translate(0.5px, 0.5px); }
        }
    </style>
</head>
<body onclick="playAudio()">

    <!-- El ID ayuda al JavaScript a saber qué mostrar -->
    <div class="container" id="capaPrincipal">
        <div class="glitch-wrapper">
            <!-- El onload dispara la función cuando la foto baja entera -->
            <img src="portada.jpg" class="portada" alt="Portada" onload="aparecer()">
        </div>
        <h1>Próximamente</h1>
    </div>

    <audio id="musica" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <script>
        function aparecer() {
            document.getElementById("capaPrincipal").classList.add("loaded");
        }

        function playAudio() {
            document.getElementById("musica").play();
        }
    </script>

</body>
</html>
