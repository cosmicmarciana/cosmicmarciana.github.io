<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PRÓXIMAMENTE | La Casa del Terror</title>
    <style>
        :root {
            --neon: #00ff00;
            --blood: #ff2b2b;
            --dark: #050303;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--dark);
            background-image: linear-gradient(180deg, #1a1412, #050303);
            color: #eee;
            /* Tipografía pesada y agresiva */
            font-family: 'Impact', 'Arial Black', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 500px;
            width: 100%;
        }

        .portada {
            width: 100%;
            height: auto;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.9);
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .proximamente {
            color: var(--blood);
            font-size: 3rem; /* Mucho más grande */
            line-height: 1;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: -1px; /* Letras pegadas para que se vea más rudo */
            font-style: italic;
        }

        .status-tag {
            display: inline-block;
            background: var(--neon);
            color: #000; /* Texto negro sobre fondo verde para que salte a la vista */
            padding: 5px 15px;
            font-size: 1.2rem;
            text-transform: uppercase;
            font-weight: 900;
            transform: skewX(-10deg); /* Efecto de inclinación */
        }

        /* Pequeño parpadeo estilo VHS estropeado */
        @keyframes glitch {
            0% { opacity: 1; }
            95% { opacity: 1; }
            96% { opacity: 0.8; }
            100% { opacity: 1; }
        }
        
        .container { animation: glitch 4s infinite; }
    </style>
</head>
<body>

    <div class="container">
        <img src="portada.jpg" alt="La Casa del Terror" class="portada">

        <div class="proximamente">SEÑAL INTERRUMIDA</div>
        
        <div class="status-tag">PRÓXIMAMENTE...</div>
    </div>

</body>
</html>
