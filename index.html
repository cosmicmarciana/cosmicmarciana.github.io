<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>COSMIC MARCIANA</title>

<style>
body {
    margin:0;
    background:#050303;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    color:white;
    overflow:hidden;
}

/* ESPIRAL */
body::before{
    content:"";
    position:absolute;
    top:50%;left:50%;
    width:300vmax;height:300vmax;
    background:repeating-conic-gradient(#050303 0 15deg,#1a1412 15deg 30deg);
    animation:spin 40s linear infinite;
    transform:translate(-50%,-50%);
    z-index:-1;
}

@keyframes spin{
    to{transform:translate(-50%,-50%) rotate(360deg);}
}

/* CONTENEDOR */
#main{
    width:85%;
    max-width:450px;
    text-align:center;
    opacity:0;
    transition:opacity .6s ease;
}
#main.visible{opacity:1;}

.glitch{
    position:relative;
    overflow:hidden;
}

/* IMAGEN BASE */
.glitch img{
    width:100%;
    display:block;
}

/* CAPAS GLITCH */
.glitch::before,
.glitch::after{
    content:"";
    position:absolute;
    inset:0;
    background:inherit;
    background-image:inherit;
    mix-blend-mode:screen;
    pointer-events:none;
}

/* rojo */
.glitch::before{
    transform:translate(2px,0);
    filter:hue-rotate(90deg);
    animation:glitch1 1.8s infinite;
}

/* azul */
.glitch::after{
    transform:translate(-2px,0);
    filter:hue-rotate(-90deg);
    animation:glitch2 1.3s infinite;
}

@keyframes glitch1{
    0%{clip-path:inset(10% 0 80% 0);}
    25%{clip-path:inset(60% 0 10% 0);}
    50%{clip-path:inset(30% 0 40% 0);}
    75%{clip-path:inset(80% 0 5% 0);}
    100%{clip-path:inset(0 0 0 0);}
}

@keyframes glitch2{
    0%{clip-path:inset(70% 0 10% 0);}
    25%{clip-path:inset(20% 0 60% 0);}
    50%{clip-path:inset(50% 0 30% 0);}
    75%{clip-path:inset(10% 0 80% 0);}
    100%{clip-path:inset(0 0 0 0);}
}

h1{
    font-size:1.1rem;
    letter-spacing:10px;
    opacity:.7;
    margin-top:20px;
}
</style>
</head>

<body>

<div id="main">
    <div class="glitch" id="glitch">
        <img src="portada.jpg" id="img" alt="">
    </div>
    <h1>PRÓXIMAMENTE</h1>
</div>

<script>
const img = document.getElementById("img");
const main = document.getElementById("main");
const glitch = document.getElementById("glitch");

/* CUANDO LA IMAGEN ESTÁ LISTA */
function init(){
    // fijamos la imagen como fondo REAL para las capas glitch
    glitch.style.backgroundImage = `url(${img.src})`;

    main.classList.add("visible");
}

/* GARANTÍA DE CARGA */
if (img.complete) {
    init();
} else {
    img.onload = init;
}
</script>

</body>
</html>
