<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>PRÓXIMAMENTE</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #050303;
            /* Usamos vh y vw dinámicos para que encaje en cualquier dispositivo */
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* FONDO ESPIRAL OPTIMIZADO */
        body::before {
            content: "";
            position: absolute;
            /* Tamaño extra para cubrir rotación en todas las resoluciones */
            width: 300vmax; 
            height: 300vmax;
            background: repeating-conic-gradient(
                from 0deg,
                #050303 0deg 15deg,
                #1a1412 15deg 30deg
            );
            animation: spiral 30s linear infinite;
            z-index: -1;
            transform-origin: center;
        }

        @keyframes spiral {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Ajuste para centrar la espiral siempre */
        body::before {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .container {
            text-align: center;
            width: 85%;
            /* Limita el tamaño en PC para que no sea gigante */
            max-width: 450px; 
            z-index: 10;
        }

        .glitch-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 30px;
            box-shadow: 0 0 80px rgba(0,0,0,0.8);
            line-height: 0;
        }

        .portada {
            width: 100%;
            height: auto;
            display: block;
            position: relative;
            animation: shake 0.3s infinite ease-in-out;
        }

        /* Capas de Glitch mejoradas para rendimiento móvil */
        .glitch-wrapper::before,
        .glitch-wrapper::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('portada.jpg') no-repeat center;
            background-size: cover;
            opacity: 0.6;
            pointer-events: none;
        }

        .glitch-wrapper::before {
            animation: glitch-total 2s infinite linear alternate-reverse;
            filter: hue-rotate(90deg) brightness(1.2);
            left: 3px;
        }

        .glitch-wrapper::after {
            animation: glitch-total 1.5s infinite linear alternate;
            filter: hue-rotate(-90deg) contrast(1.3);
            left: -3px;
        }

        h1 {
            /* Fuente normal, limpia y escalable */
            font-size: clamp(1rem, 4vw, 1.3rem); 
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: clamp(5px, 2vw, 12px);
            margin: 0;
            opacity: 0.8;
            text-shadow: 0 2px 10px rgba(0,0,0,1);
            /* Asegura que no se corte en móviles pequeños */
            white-space: nowrap; 
        }

        @keyframes glitch-total {
            0% { clip-path: inset(10% 0 80% 0); transform: translate(-2px); }
            25% { clip-path: inset(70% 0 5% 0); transform: translate(2px); }
            50% { clip-path: inset(30% 0 35% 0); transform: translate(-4px); }
            75% { clip-path: inset(55% 0 15% 0); transform: translate(4px); }
            100% { clip-path: inset(5% 0 85% 0); transform: translate(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translate(0); }
            25% { transform: translate(0.5px, 0.5px); }
            75% { transform: translate(-0.5px, -0.5px); }
        }

        /* Ajustes específicos para móviles muy pequeños */
        @media (max-height: 500px) {
            .container { max-width: 280px; }
            h1 { margin-top: 10px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="glitch-wrapper">
            <img src="portada.jpg" class="portada" alt="Portada">
        </div>
        <h1>Próximamente</h1>
    </div>

</body>
</html>
