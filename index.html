<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>COSMIC MARCIANA</title>

<style>
body{
    margin:0;
    background:#050303;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial, sans-serif;
    color:white;
}

/* ESPIRAL */
body::before{
    content:"";
    position:absolute;
    top:50%;
    left:50%;
    width:300vmax;
    height:300vmax;
    background:
    repeating-conic-gradient(
        #050303 0 15deg,
        #1a1412 15deg 30deg
    );
    animation:spin 40s linear infinite;
    transform:translate(-50%,-50%);
    z-index:-1;
}

@keyframes spin{
    to{
        transform:translate(-50%,-50%) rotate(360deg);
    }
}

/* WRAP */
#wrap{
    width:85%;
    max-width:460px;
    text-align:center;
}

/* CANVAS */
canvas{
    width:100%;
    display:block;
    margin-bottom:28px;
}

/* TITULOS */
.artist{
    font-size:.7rem;
    letter-spacing:6px;
    opacity:.45;
    margin-bottom:10px;
}

.title{
    font-size:1.15rem;
    letter-spacing:10px;
    margin-bottom:28px;
}

/* BOTON */
#playBtn{
    background:transparent;
    border:1px solid rgba(255,255,255,.6);
    color:white;
    padding:12px 26px;
    letter-spacing:5px;
    font-size:.72rem;
    cursor:pointer;
    transition:.25s;
}

#playBtn:hover{
    border-color:white;
    background:rgba(255,255,255,.05);
}
</style>
</head>

<body>

<div id="wrap">

    <canvas id="canvas"></canvas>

    <div class="artist">
        COSMIC MARCIANA
    </div>

    <div class="title">
        LA CASA DEL TERROR
    </div>

    <button id="playBtn">
        ESCUCHAR
    </button>

</div>

<audio id="audio" loop>
    <source src="04-la_casa_del_terror.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const audio = document.getElementById("audio");
const btn = document.getElementById("playBtn");

const img = new Image();
img.src = "portada.webp";

let w,h;
let playing = false;

/* CARGA */
img.onload = () => {
    w = canvas.width = img.width;
    h = canvas.height = img.height;
    loop();
};

/* GLITCH */
function glitch(){

    ctx.drawImage(img,0,0,w,h);

    // cortes horizontales
    for(let i=0;i<10;i++){

        let y = Math.random()*h;
        let sh = Math.random()*25+5;
        let dx = (Math.random()-0.5)*40;

        ctx.drawImage(
            canvas,
            0,y,w,sh,
            dx,y,w,sh
        );
    }

    // bloques verticales
    for(let i=0;i<2;i++){

        let x = Math.random()*w;
        let sw = Math.random()*80+20;

        ctx.drawImage(
            canvas,
            x,0,sw,h,
            x+(Math.random()-0.5)*30,0,sw,h
        );
    }

    // flash ocasional
    if(Math.random()<0.08){

        ctx.fillStyle="rgba(255,255,255,.04)";
        ctx.fillRect(0,0,w,h);
    }
}

/* LOOP */
function loop(){

    glitch();

    requestAnimationFrame(loop);
}

/* PLAYER */
btn.addEventListener("click", async ()=>{

    if(!playing){

        await audio.play().catch(()=>{});

        playing = true;
        btn.textContent = "DETENER";

    }else{

        audio.pause();
        audio.currentTime = 0;

        playing = false;
        btn.textContent = "ESCUCHAR";
    }
});

/* PARAR AL SALIR */
function stopAudio(){

    audio.pause();
    audio.currentTime = 0;

    playing = false;
    btn.textContent = "ESCUCHAR";
}

document.addEventListener("visibilitychange", ()=>{

    if(document.hidden){
        stopAudio();
    }
});

window.addEventListener("pagehide", stopAudio);
</script>

</body>
</html>
