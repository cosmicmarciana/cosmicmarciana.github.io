<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PRÓXIMAMENTE | La Casa del Terror</title>

<style>
  :root {
    --neon: #00ff00;
    --ink: #eaeaea;
    --blood: #ff2b2b;
  }

  body {
    margin: 0;
    padding: 0;
    background: #050303; /* Fondo negro puro de tu web */
    color: var(--ink);
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* El mismo fondo de texturas que ya usas */
  .bg-texture {
    position: fixed;
    inset: 0;
    background: 
      repeating-radial-gradient(circle at 30% 40%, rgba(255,255,255,.04) 0, transparent 7px),
      linear-gradient(180deg, #1a1412, #050303);
    z-index: -1;
  }

  .container {
    text-align: center;
    padding: 20px;
    max-width: 500px;
  }

  /* Efecto TV para la portada */
  .crt-frame {
    position: relative;
    display: inline-block;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(0,0,0,0.8), 0 0 15px rgba(0,255,0,0.1);
    margin-bottom: 30px;
  }

  .crt-frame::before {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(to bottom, rgba(255,255,255,.03) 0px, transparent 3px);
    pointer-events: none;
    z-index: 2;
  }

  .portada {
    display: block;
    width: 100%;
    max-width: 350px;
    height: auto;
    filter: brightness(0.9) contrast(1.1);
    animation: flicker 4s infinite;
  }

  /* Tu Glitch Rojo */
  .glitch-title {
    color: var(--blood);
    font-size: 24px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: .25em;
    position: relative;
    text-shadow: 0 0 10px rgba(255,43,43,0.3);
    margin-bottom: 10px;
  }

  /* Botón estilo neón */
  .status-btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 24px;
    border: 1px solid var(--neon);
    background: rgba(0, 255, 0, 0.05);
    color: var(--neon);
    text-decoration: none;
    font-size: 14px;
    letter-spacing: 2px;
    border-radius: 999px;
    box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
    animation: pulse-neon 2s infinite ease-in-out;
  }

  @keyframes flicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.97; }
    52% { opacity: 0.99; }
  }

  @keyframes pulse-neon {
    0%, 100% { box-shadow: 0 0 15px rgba(0, 255, 0, 0.2); transform: scale(1); }
    50% { box-shadow: 0 0 30px rgba(0, 255, 0, 0.4); transform: scale(1.02); }
  }

  .sub {
    font-size: 12px;
    opacity: 0.6;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 15px;
  }
</style>
</head>
<body>

  <div class="bg-texture"></div>

  <div class="container">
    <div class="crt-frame">
      <!-- Asegúrate de que el nombre coincida con tu imagen -->
      <img src="portada.jpg" alt="Portada" class="portada">
    </div>

    <div class="glitch-title">EL VIAJE COMIENZA</div>
    <div class="sub">Primer single en camino</div>
    
    <div class="status-btn">PRÓXIMAMENTE EN SPOTIFY</div>
  </div>

</body>
</html>
