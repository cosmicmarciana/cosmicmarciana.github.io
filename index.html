<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>PRÓXIMAMENTE</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #050303;
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* TU ESPIRAL ANIMADA SIEMPRE ACTIVA */
        body::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300vmax; 
            height: 300vmax;
            background: repeating-conic-gradient(
                from 0deg,
                #050303 0deg 15deg,
                #1a1412 15deg 30deg
            );
            animation: spiral 30s linear infinite;
            z-index: -1;
            transform: translate(-50%, -50%);
        }

        @keyframes spiral {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .container {
            text-align: center;
            width: 85%;
            max-width: 450px; 
            z-index: 10;
        }

        .glitch-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 30px;
            box-shadow: 0 0 80px rgba(0,0,0,0.8);
            line-height: 0;
        }

        .portada {
            width: 100%;
            height: auto;
            display: block;
            animation: shake 0.3s infinite ease-in-out;
        }

        /* GLITCH QUE CUBRE TODA LA IMAGEN (FIXED) */
        .glitch-wrapper::before,
        .glitch-wrapper::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('portada.jpg') no-repeat center;
            background-size: cover;
            opacity: 0.6;
            pointer-events: none;
        }

        .glitch-wrapper::before {
            animation: glitch-total 2s infinite linear alternate-reverse;
            filter: hue-rotate(90deg);
            left: 3px;
        }

        .glitch-wrapper::after {
            animation: glitch-total 1.5s infinite linear alternate;
            filter: hue-rotate(-90deg);
            left: -3px;
        }

        /* Animación que recorre TODA la altura de la foto */
        @keyframes glitch-total {
            0% { clip-path: inset(0% 0 85% 0); transform: translate(-5px); }
            20% { clip-path: inset(80% 0 0% 0); transform: translate(5px); }
            40% { clip-path: inset(30% 0 30% 0); transform: translate(-8px); }
            60% { clip-path: inset(10% 0 70% 0); transform: translate(8px); }
            80% { clip-path: inset(50% 0 10% 0); transform: translate(-5px); }
            100% { clip-path: inset(0% 0 0% 0); transform: translate(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translate(0); }
            50% { transform: translate(1px, 1px); }
        }

        h1 {
            font-size: clamp(1rem, 4vw, 1.3rem); 
            text-transform: uppercase;
            letter-spacing: 10px;
            margin: 0;
            opacity: 0.7;
        }
    </style>
</head>
<body onclick="document.getElementById('musica').play()">

    <div class="container">
        <div class="glitch-wrapper">
            <img src="portada.jpg" class="portada" alt="Portada">
        </div>
        <h1>Próximamente</h1>
    </div>

    <audio id="musica" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

</body>
</html>
