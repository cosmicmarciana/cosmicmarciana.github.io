<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>COSMIC MARCIANA</title>

<style>
:root{
  --screen-left: 13%;
  --screen-top: 12%;
  --screen-width: 74%;
  --screen-height: 58%;
}

body{
  margin:0;
  height:100vh;
  background:#050303;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  font-family:Arial,sans-serif;
  color:white;
}

body::before{
  content:"";
  position:absolute;
  top:50%;
  left:50%;
  width:300vmax;
  height:300vmax;
  background:repeating-conic-gradient(#050303 0 15deg,#1a1412 15deg 30deg);
  animation:spin 45s linear infinite;
  transform:translate(-50%,-50%);
  z-index:-2;
}

@keyframes spin{
  to{transform:translate(-50%,-50%) rotate(360deg);}
}

#wrap{
  width:90%;
  max-width:520px;
  text-align:center;
  position:relative;
  z-index:2;
}

.tv{
  position:relative;
  width:100%;
}

.tv-img{
  width:100%;
  display:block;
  position:relative;
  z-index:3;
  pointer-events:none;
}

.screen{
  position:absolute;
  left:var(--screen-left);
  top:var(--screen-top);
  width:var(--screen-width);
  height:var(--screen-height);
  overflow:hidden;
  background:#050303;
  z-index:1;
}

.screen canvas{
  width:100%;
  height:100%;
  display:block;
}

.scanlines{
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.07) 0px,
    rgba(255,255,255,.07) 1px,
    transparent 2px,
    transparent 4px
  );
  mix-blend-mode:overlay;
  opacity:.35;
  pointer-events:none;
}

.artist{
  margin-top:18px;
  font-size:.7rem;
  letter-spacing:6px;
  opacity:.5;
}

.title{
  margin-top:10px;
  font-size:1.05rem;
  letter-spacing:8px;
}

button{
  margin-top:22px;
  background:transparent;
  color:white;
  border:1px solid rgba(255,255,255,.65);
  padding:12px 26px;
  letter-spacing:5px;
  font-size:.72rem;
  cursor:pointer;
}

button:hover{
  border-color:white;
}
</style>
</head>

<body>

<div id="wrap">

  <div class="tv">
    <div class="screen">
      <canvas id="canvas"></canvas>
      <div class="scanlines"></div>
    </div>

    <img src="tele.webp" class="tv-img" alt="">
  </div>

  <div class="artist">COSMIC MARCIANA</div>
  <div class="title">LA CASA DEL TERROR</div>

  <button id="playBtn">ESCUCHAR</button>

</div>

<audio id="audio" loop>
  <source src="la-casa-del-terror.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const audio = document.getElementById("audio");
const btn = document.getElementById("playBtn");

let playing = false;
let w,h;

function resize(){
  const rect = canvas.getBoundingClientRect();
  w = canvas.width = rect.width * devicePixelRatio;
  h = canvas.height = rect.height * devicePixelRatio;
}

window.addEventListener("resize", resize);
resize();

function drawGlitch(){
  ctx.fillStyle = "#050303";
  ctx.fillRect(0,0,w,h);

  ctx.fillStyle = "#d8ffd8";
  ctx.font = `${Math.floor(w*0.08)}px monospace`;
  ctx.textAlign = "center";

  ctx.fillText("LA CASA", w/2, h*.38);
  ctx.fillText("DEL TERROR", w/2, h*.52);

  for(let i=0;i<12;i++){
    const y = Math.random()*h;
    const sh = Math.random()*18+4;
    const dx = (Math.random()-.5)*45;

    ctx.drawImage(canvas,0,y,w,sh,dx,y,w,sh);
  }

  if(Math.random()<.12){
    ctx.fillStyle="rgba(255,255,255,.08)";
    ctx.fillRect(0,Math.random()*h,w,Math.random()*20+4);
  }

  requestAnimationFrame(drawGlitch);
}

drawGlitch();

btn.addEventListener("click", async ()=>{
  if(audio.paused){
    await audio.play().catch(()=>{});
    btn.textContent = "DETENER";
  }else{
    audio.pause();
    audio.currentTime = 0;
    btn.textContent = "ESCUCHAR";
  }
});

function stopAudio(){
  audio.pause();
  audio.currentTime = 0;
  btn.textContent = "ESCUCHAR";
}

document.addEventListener("visibilitychange", ()=>{
  if(document.hidden) stopAudio();
});

window.addEventListener("pagehide", stopAudio);
</script>

</body>
</html>
