<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>COSMIC MARCIANA</title>

<style>
body{
    margin:0;
    background:#050303;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial, sans-serif;
    color:white;
}

body::before{
    content:"";
    position:absolute;
    top:50%;left:50%;
    width:300vmax;height:300vmax;
    background:repeating-conic-gradient(#050303 0 15deg,#1a1412 15deg 30deg);
    animation:spin 40s linear infinite;
    transform:translate(-50%,-50%);
    z-index:-1;
}

@keyframes spin{
    to{transform:translate(-50%,-50%) rotate(360deg);}
}

#wrap{
    width:85%;
    max-width:450px;
    text-align:center;
}

#enter,
#singleBtn{
    padding:12px 24px;
    border:1px solid rgba(255,255,255,.75);
    background:transparent;
    color:white;
    letter-spacing:4px;
    cursor:pointer;
    font-size:13px;
}

#enter:hover,
#singleBtn:hover{
    border-color:white;
}

canvas{
    width:100%;
    display:none;
    margin-bottom:20px;
}

#content{
    display:none;
}

h1{
    letter-spacing:10px;
    font-size:1.1rem;
    opacity:.7;
    margin:0 0 30px;
}

.signal{
    font-size:.75rem;
    letter-spacing:4px;
    opacity:.65;
    margin-bottom:14px;
}

.single-title{
    font-size:1.2rem;
    letter-spacing:6px;
    text-transform:uppercase;
    margin-bottom:22px;
}

.status{
    margin-top:14px;
    font-size:.7rem;
    letter-spacing:3px;
    opacity:.45;
}
</style>
</head>

<body>

<div id="wrap">
    <button id="enter">ENTRAR</button>

    <canvas id="canvas"></canvas>

    <div id="content">
        <h1>PRÓXIMAMENTE</h1>

        <div class="signal">TRANSMISIÓN 01 DETECTADA</div>
        <div class="single-title">LA CASA DEL TERROR</div>

        <button id="singleBtn">ESCUCHAR SEÑAL</button>
        <div class="status" id="status">SEÑAL INACTIVA</div>
    </div>
</div>

<audio id="ambiente" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<audio id="single">
    <source src="la_casa_del_terror.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const enter = document.getElementById("enter");
const content = document.getElementById("content");
const ambiente = document.getElementById("ambiente");
const single = document.getElementById("single");
const singleBtn = document.getElementById("singleBtn");
const statusText = document.getElementById("status");

const img = new Image();
img.src = "portada.webp";

let w, h;
let started = false;
let animating = false;

/* ENTRADA */
enter.addEventListener("click", async () => {
    started = true;

    enter.style.display = "none";
    canvas.style.display = "block";
    content.style.display = "block";

    await ambiente.play().catch(()=>{});

    if(img.complete){
        initCanvas();
    }else{
        img.onload = initCanvas;
    }
});

/* CANVAS */
function initCanvas(){
    w = canvas.width = img.width;
    h = canvas.height = img.height;

    if(!animating){
        animating = true;
        loop();
    }
}

/* GLITCH */
function glitch(){
    ctx.drawImage(img,0,0,w,h);

    for(let i=0;i<10;i++){
        let y = Math.random()*h;
        let sh = Math.random()*25+5;
        let dx = (Math.random()-0.5)*40;
        ctx.drawImage(canvas,0,y,w,sh,dx,y,w,sh);
    }

    for(let i=0;i<2;i++){
        let x = Math.random()*w;
        let sw = Math.random()*80+20;
        ctx.drawImage(canvas,x,0,sw,h,x+(Math.random()-0.5)*30,0,sw,h);
    }

    if(Math.random()<0.08){
        ctx.fillStyle="rgba(255,255,255,0.04)";
        ctx.fillRect(0,0,w,h);
    }
}

function loop(){
    if(started && w && h){
        glitch();
    }
    requestAnimationFrame(loop);
}

/* PLAYER SINGLE */
singleBtn.addEventListener("click", async () => {
    if(single.paused){
        ambiente.pause();
        ambiente.currentTime = 0;

        await single.play().catch(()=>{});

        singleBtn.textContent = "DETENER SEÑAL";
        statusText.textContent = "SEÑAL ACTIVA";
    }else{
        single.pause();
        single.currentTime = 0;

        singleBtn.textContent = "ESCUCHAR SEÑAL";
        statusText.textContent = "SEÑAL INACTIVA";
    }
});

single.addEventListener("ended", () => {
    singleBtn.textContent = "ESCUCHAR SEÑAL";
    statusText.textContent = "SEÑAL FINALIZADA";
});

/* PARAR AL SALIR */
function stopAll(){
    ambiente.pause();
    ambiente.currentTime = 0;

    single.pause();
    single.currentTime = 0;
}

document.addEventListener("visibilitychange", () => {
    if(document.hidden) stopAll();
});

window.addEventListener("pagehide", stopAll);
</script>

</body>
</html>
