<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>COSMIC MARCIANA</title>

<style>
body{
    margin:0;
    background:#050303;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
    font-family:Arial, sans-serif;
}

/* espiral */
body::before{
    content:"";
    position:absolute;
    top:50%;left:50%;
    width:300vmax;height:300vmax;
    background:repeating-conic-gradient(#050303 0 15deg,#1a1412 15deg 30deg);
    animation:spin 40s linear infinite;
    transform:translate(-50%,-50%);
    z-index:-1;
}
@keyframes spin{
    to{transform:translate(-50%,-50%) rotate(360deg);}
}

#wrap{
    text-align:center;
    width:85%;
    max-width:450px;
}

canvas{
    width:100%;
    display:block;
    margin-bottom:20px;
}

h1{
    letter-spacing:10px;
    font-size:1.1rem;
    opacity:.7;
}
</style>
</head>

<body>

<div id="wrap">
    <canvas id="c"></canvas>
    <h1>PRÓXIMAMENTE</h1>
</div>

<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const audio = document.getElementById("musica");

const img = new Image();
img.src = "portada.webp";

img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;
    draw();
};

function draw(){
    ctx.drawImage(img,0,0);

    // slices glitch
    for(let i=0;i<6;i++){
        let y = Math.random()*canvas.height;
        let h = Math.random()*20 + 5;
        let offset = (Math.random()-0.5)*20;

        ctx.drawImage(canvas,0,y,canvas.width,h,offset,y,canvas.width,h);
    }

    // RGB shift
    let shift = 2;
    ctx.globalCompositeOperation = "lighter";
    ctx.drawImage(canvas, shift,0);
    ctx.drawImage(canvas, -shift,0);
    ctx.globalCompositeOperation = "source-over";

    requestAnimationFrame(draw);
}

/* ACTIVAR AUDIO CON CLICK (necesario en navegadores) */
document.body.addEventListener("click", () => {
    audio.play().catch(()=>{});
}, { once: true });
</script>

</body>
</html>
