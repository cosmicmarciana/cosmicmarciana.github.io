<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Próximamente | La casa del terror</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212; /* Color oscuro de fondo */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 20px;
        }
        .portada {
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        h1 {
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        p {
            color: #b3b3b3;
            font-size: 1rem;
        }
        .proximamente {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            border: 1px solid white;
            border-radius: 50px;
            font-weight: bold;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="portada.jpg" alt="Portada del disco" class="portada">
        
        <h1>Nuevo Disco</h1>
        <p>El viaje comienza muy pronto.</p>
        
        <div class="proximamente">PRÓXIMAMENTE EN SPOTIFY</div>
    </div>

</body>
</html>
