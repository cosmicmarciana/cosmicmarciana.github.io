<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PRÓXIMAMENTE</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Tu fondo original del player */
            background: linear-gradient(180deg, #1a1412, #050303);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        /* EFECTO GLITCH PARA LA PORTADA */
        .glitch-wrapper {
            position: relative;
            margin-bottom: 30px;
        }

        .portada {
            width: 100%;
            display: block;
            position: relative;
            z-index: 1;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* Capas de glitch */
        .glitch-wrapper::before,
        .glitch-wrapper::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('portada.jpg') no-repeat center;
            background-size: cover;
            opacity: 0.5;
        }

        .glitch-wrapper::before {
            left: 2px;
            text-shadow: -2px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .glitch-wrapper::after {
            left: -2px;
            text-shadow: -2px 0 #00fff9, 2px 2px #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 1s infinite linear alternate-reverse;
        }

        /* TEXTO PRÓXIMAMENTE NORMAL */
        h1 {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 8px;
            font-size: 1.2rem;
            margin: 0;
            opacity: 0.8;
        }

        /* ANIMACIONES */
        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); }
            20% { clip: rect(62px, 9999px, 42px, 0); }
            40% { clip: rect(16px, 9999px, 78px, 0); }
            60% { clip: rect(81px, 9999px, 13px, 0); }
            80% { clip: rect(43px, 9999px, 55px, 0); }
            100% { clip: rect(12px, 9999px, 90px, 0); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(65px, 9999px, 100px, 0); }
            20% { clip: rect(10px, 9999px, 30px, 0); }
            40% { clip: rect(45px, 9999px, 80px, 0); }
            60% { clip: rect(15px, 9999px, 55px, 0); }
            80% { clip: rect(70px, 9999px, 95px, 0); }
            100% { clip: rect(5px, 9999px, 25px, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="glitch-wrapper">
            <img src="portada.jpg" class="portada" alt="Portada">
        </div>
        <h1>Próximamente</h1>
    </div>

</body>
</html>
