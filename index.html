<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>COSMIC MARCIANA — SEÑALES</title>

<style>
*{
  box-sizing:border-box;
}

html,
body{
  margin:0;
  width:100%;
  min-height:100vh;
  background:#000;
  overflow-x:hidden;
  overflow-y:auto;
}

body{
  color:white;
  font-family:Arial,sans-serif;
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

#wrap{
  width:100%;
  max-width:860px;
  text-align:center;
  padding:4px 12px 40px;
}

.tvCrop{
  position:relative;
  width:100%;
  aspect-ratio:1448/760;
  overflow:hidden;
  margin:0 auto 2px;
}

.tvCrop img{
  position:absolute;
  inset:0;
  width:100%;
  display:block;
  user-select:none;
  pointer-events:none;
}

/* GLITCH */

.screenGlitch{
  position:absolute;
  left:32.9%;
  top:30%;
  width:36.7%;
  height:46.8%;
  border-radius:9% / 13%;
  overflow:hidden;
  pointer-events:none;
  mix-blend-mode:screen;
  opacity:.95;
  filter:
    contrast(1.6)
    brightness(1.35)
    saturate(1.4);
}

.screenGlitch::before{
  content:"";
  position:absolute;
  inset:-20%;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,.24) 0px,
      rgba(255,255,255,.24) 1px,
      transparent 2px,
      transparent 4px
    ),
    repeating-linear-gradient(
      90deg,
      rgba(255,0,0,.20) 0px,
      rgba(255,0,0,.20) 2px,
      rgba(0,255,255,.16) 3px,
      transparent 6px
    );
  opacity:.72;
  animation:
    scanMove .09s infinite steps(2),
    noiseShift .28s infinite steps(3);
}

.screenGlitch::after{
  content:"";
  position:absolute;
  inset:-8%;
  background:
    linear-gradient(
      90deg,
      rgba(255,0,0,.36),
      rgba(0,255,255,.22),
      rgba(255,255,255,.12)
    );
  mix-blend-mode:screen;
  opacity:.42;
  animation:
    rgbShake .12s infinite steps(2);
}

.screenGlitch span{
  position:absolute;
  left:-18%;
  width:136%;
  height:10%;
  background:rgba(255,255,255,.38);
  opacity:.55;
  mix-blend-mode:screen;
  animation:
    glitchBar .42s infinite steps(2);
  box-shadow:
    0 0 8px rgba(255,255,255,.35),
    16px 0 0 rgba(255,0,0,.22),
    -16px 0 0 rgba(0,255,255,.22);
}

.screenGlitch span:nth-child(1){ top:6%; animation-duration:.31s; }
.screenGlitch span:nth-child(2){ top:22%; animation-duration:.46s; }
.screenGlitch span:nth-child(3){ top:39%; animation-duration:.27s; }
.screenGlitch span:nth-child(4){ top:57%; animation-duration:.38s; }
.screenGlitch span:nth-child(5){ top:74%; animation-duration:.52s; }
.screenGlitch span:nth-child(6){ top:88%; animation-duration:.34s; }

@keyframes glitchBar{
  0%{ transform:translateX(-22px) scaleY(.5); }
  20%{ transform:translateX(28px) scaleY(1.7); }
  40%{ transform:translateX(-36px) scaleY(.8); }
  60%{ transform:translateX(42px) scaleY(1.25); }
  80%{ transform:translateX(-18px) scaleY(2); }
  100%{ transform:translateX(-22px) scaleY(.5); }
}

@keyframes scanMove{
  0%{ transform:translateY(0); }
  50%{ transform:translateY(7px); }
  100%{ transform:translateY(0); }
}

@keyframes noiseShift{
  0%{ background-position:0 0, 0 0; }
  50%{ background-position:0 13px, 17px 0; }
  100%{ background-position:0 0, 0 0; }
}

@keyframes rgbShake{
  0%{ transform:translate(0,0) skewX(0deg); }
  25%{ transform:translate(8px,-2px) skewX(3deg); }
  50%{ transform:translate(-10px,3px) skewX(-4deg); }
  75%{ transform:translate(5px,1px) skewX(2deg); }
  100%{ transform:translate(0,0) skewX(0deg); }
}

/* TEXTOS */

.signal{
  font-size:.78rem;
  letter-spacing:7px;
  opacity:.5;
  margin-bottom:10px;
}

.title{
  font-family:Impact, "Arial Black", sans-serif;
  font-size:2.35rem;
  letter-spacing:10px;
  text-transform:uppercase;
  color:#b91616;
  margin-bottom:12px;
  transform:scaleY(1.25);
  animation:titleShake 2.4s infinite steps(1);
}

@keyframes titleShake{
  0%,88%,100%{
    transform:scaleY(1.25) translate(0,0);
    filter:none;
  }

  90%{
    transform:scaleY(1.25) translate(-1px,0);
    filter:blur(.2px);
  }

  92%{
    transform:scaleY(1.25) translate(2px,1px);
  }

  94%{
    transform:scaleY(1.25) translate(-2px,-1px);
  }

  96%{
    transform:scaleY(1.25) translate(1px,0);
  }
}

.subsignal{
  font-size:.9rem;
  letter-spacing:6px;
  opacity:.5;
  margin-top:22px;
  margin-bottom:24px;
}

/* LISTA DE SEÑALES */

.trackList{
  width:100%;
  max-width:480px;
  margin:0 auto 28px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.trackBtn{
  width:100%;
  background:transparent;
  border:1px solid rgba(255,43,43,.32);
  color:rgba(255,255,255,.52);
  font-size:.72rem;
  letter-spacing:4px;
  text-transform:none;
  padding:11px 12px;
  cursor:pointer;
}

.trackBtn.active{
  color:#ff2b2b;
  border-color:rgba(255,43,43,.78);
}

/* PLAYER */

.player{
  width:100%;
  max-width:480px;
  margin:0 auto;
  display:flex;
  align-items:center;
  gap:14px;
}

#playBtn{
  width:54px;
  height:54px;
  border-radius:50%;
  background:transparent;
  border:1px solid rgba(255,43,43,.75);
  color:#ff2b2b;
  font-size:1.05rem;
  cursor:pointer;
  flex:0 0 auto;
}

.time{
  font-size:.72rem;
  opacity:.55;
  min-width:42px;
}

.bar{
  position:relative;
  height:4px;
  flex:1;
  background:rgba(255,255,255,.16);
  cursor:pointer;
}

.progress{
  position:absolute;
  left:0;
  top:0;
  height:100%;
  width:0%;
  background:#ff2b2b;
}

/* MÓVIL */

@media(max-width:700px){

  #wrap{
    padding-top:2px;
    padding-left:12px;
    padding-right:12px;
    padding-bottom:20px;
  }

  .tvCrop{
    width:138%;
    margin-left:-19%;
    margin-bottom:10px;
  }

  .signal{
    font-size:.68rem;
    letter-spacing:4px;
    margin-bottom:9px;
  }

  .title{
    font-size:1.55rem;
    letter-spacing:4px;
    margin-bottom:10px;
  }

  .subsignal{
    font-size:.72rem;
    letter-spacing:4px;
    margin-top:18px;
    margin-bottom:24px;
  }

  .trackList{
    max-width:360px;
    margin-bottom:26px;
    gap:9px;
  }

  .trackBtn{
    font-size:.62rem;
    letter-spacing:3px;
    padding:10px 8px;
  }

  .player{
    max-width:360px;
    gap:10px;
  }

  #playBtn{
    width:48px;
    height:48px;
  }
}
</style>
</head>

<body>

<div id="wrap">

  <div class="tvCrop">

    <img src="teleroja.webp" alt="Tele roja Cosmic Marciana">

    <div class="screenGlitch">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>

  </div>

  <div class="signal">
    COSMIC MARCIANA
  </div>

  <div class="title">
    LA CASA DEL TERROR
  </div>

  <div class="subsignal" id="trackSignal">
  SEÑAL 03 · Quemarlo todo
</div>

  <div class="trackList" id="trackList"></div>

  <div class="player">

    <button id="playBtn">
      ▶
    </button>

    <div class="time" id="current">
      0:00
    </div>

    <div class="bar" id="bar">
      <div class="progress" id="progress"></div>
    </div>

    <div class="time" id="duration">
      0:00
    </div>

  </div>

</div>

<audio id="audio"></audio>

<script>
const tracks = [
  {
    signal: "SEÑAL 03 · Quemarlo todo",
    file: "08-quemarlo_todo.mp3"
  },
  {
    signal: "SEÑAL 01 · La casa del terror",
    file: "04-la_casa_del_terror.mp3"
  },
  {
    signal: "SEÑAL 02 · Noche sintética",
    file: "01-noche_sintetica.mp3"
  }
];

const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const current = document.getElementById("current");
const duration = document.getElementById("duration");
const progress = document.getElementById("progress");
const bar = document.getElementById("bar");
const trackSignal = document.getElementById("trackSignal");
const trackList = document.getElementById("trackList");

let currentTrack = 0;

function formatTime(sec){

  if(!sec || isNaN(sec)){
    return "0:00";
  }

  const m = Math.floor(sec / 60);

  const s = Math.floor(sec % 60)
    .toString()
    .padStart(2,"0");

  return `${m}:${s}`;
}

function resetPlayer(){

  audio.pause();

  playBtn.textContent = "▶";

  progress.style.width = "0%";

  current.textContent = "0:00";

  duration.textContent = "0:00";
}

function renderTrackButtons(){

  trackList.innerHTML = "";

  tracks.forEach((track, index)=>{

    const btn = document.createElement("button");

    btn.className = "trackBtn";

    if(index === currentTrack){
      btn.classList.add("active");
    }

    btn.textContent = track.signal;

    btn.addEventListener("click", ()=>{

      if(index === currentTrack){

        audio.currentTime = 0;

        audio.play().then(()=>{

          playBtn.textContent = "❚❚";

        }).catch(()=>{});

        return;
      }

      loadTrack(index, true);
    });

    trackList.appendChild(btn);
  });
}

function loadTrack(index, autoplay){

  currentTrack = index;

  const track = tracks[currentTrack];

  resetPlayer();

  trackSignal.textContent = track.signal;

  audio.src = track.file;

  audio.load();

  renderTrackButtons();

  if(autoplay){

    audio.play().then(()=>{

      playBtn.textContent = "❚❚";

    }).catch(()=>{});
  }
}

playBtn.addEventListener("click", async ()=>{

  if(audio.paused){

    await audio.play().catch(()=>{});

    playBtn.textContent = "❚❚";

  }else{

    audio.pause();

    playBtn.textContent = "▶";
  }
});

audio.addEventListener("loadedmetadata", ()=>{

  duration.textContent =
    formatTime(audio.duration);
});

audio.addEventListener("timeupdate", ()=>{

  current.textContent =
    formatTime(audio.currentTime);

  if(audio.duration){

    progress.style.width =
      `${(audio.currentTime / audio.duration) * 100}%`;
  }
});

audio.addEventListener("ended", ()=>{

  const nextTrack = currentTrack + 1;

  if(nextTrack < tracks.length){

    loadTrack(nextTrack, true);

  }else{

    loadTrack(0, false);
  }
});

bar.addEventListener("click", e=>{

  if(!audio.duration){
    return;
  }

  const rect =
    bar.getBoundingClientRect();

  const pos =
    (e.clientX - rect.left) / rect.width;

  audio.currentTime =
    pos * audio.duration;
});

function stopAudio(){

  resetPlayer();
}

loadTrack(0, false);
</script>

</body>
</html>
