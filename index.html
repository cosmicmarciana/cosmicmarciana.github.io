<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PRÓXIMAMENTE</title>
    <style>
        /* TU FONDO DE ESPIRAL ANIMADA */
        body {
            margin: 0;
            padding: 0;
            background: #050303;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Generador de la espiral del player */
        body::before {
            content: "";
            position: absolute;
            width: 300%;
            height: 300%;
            background: repeating-conic-gradient(
                from 0deg,
                #050303 0deg 15deg,
                #1a1412 15deg 30deg
            );
            animation: spiral 20s linear infinite;
            z-index: -1;
        }

        @keyframes spiral {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
            z-index: 10;
        }

        /* GLITCH AGRESIVO EN TODA LA PORTADA */
        .glitch-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 40px;
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
        }

        .portada {
            width: 100%;
            height: auto;
            display: block;
            position: relative;
            animation: shake 0.2s infinite;
        }

        /* Capas que "rompen" la imagen de arriba a abajo */
        .glitch-wrapper::before,
        .glitch-wrapper::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('portada.jpg') no-repeat center;
            background-size: cover;
            opacity: 0.7;
        }

        .glitch-wrapper::before {
            animation: glitch-total 1.5s infinite linear alternate-reverse;
            filter: hue-rotate(90deg);
            left: 5px;
        }

        .glitch-wrapper::after {
            animation: glitch-total 1s infinite linear alternate;
            filter: hue-rotate(-90deg);
            left: -5px;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 12px;
            margin: 0;
            opacity: 0.8;
            text-shadow: 0 0 10px rgba(0,0,0,1);
        }

        /* Animación de glitch que recorre toda la altura */
        @keyframes glitch-total {
            0% { clip-path: inset(0% 0 80% 0); transform: translate(-5px); }
            20% { clip-path: inset(80% 0 0% 0); transform: translate(5px); }
            40% { clip-path: inset(30% 0 30% 0); transform: translate(-8px); }
            60% { clip-path: inset(10% 0 70% 0); transform: translate(8px); }
            80% { clip-path: inset(50% 0 10% 0); transform: translate(-5px); }
            100% { clip-path: inset(0% 0 0% 0); transform: translate(0); }
        }

        @keyframes shake {
            0% { transform: translate(0); }
            50% { transform: translate(1px, 1px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="glitch-wrapper">
            <img src="portada.jpg" class="portada" alt="Portada">
        </div>
        <h1>Próximamente</h1>
    </div>

</body>
</html>
