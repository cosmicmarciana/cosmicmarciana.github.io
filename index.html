<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PRÓXIMAMENTE | La Casa del Terror</title>
    <style>
        :root {
            --neon: #00ff00;
            --blood: #ff2b2b;
            --dark: #050303;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark);
            /* Tu fondo original */
            background-image: linear-gradient(180deg, #1a1412, #050303);
            color: #eee;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 450px;
            width: 100%;
        }

        .portada {
            width: 100%;
            height: auto;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), 0 0 10px rgba(255, 43, 43, 0.2);
            margin-bottom: 30px;
            display: block;
        }

        .proximamente {
            color: var(--blood);
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 15px;
            animation: flicker 3s infinite;
        }

        .status-tag {
            display: inline-block;
            border: 1px solid var(--neon);
            color: var(--neon);
            padding: 8px 15px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            border-radius: 2px;
            text-transform: uppercase;
            background: rgba(0, 255, 0, 0.05);
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; text-shadow: 0 0 10px var(--blood); }
            55% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Tu imagen de portada -->
        <img src="portada.jpg" alt="La Casa del Terror" class="portada">

        <div class="proximamente">Próximamente</div>
        
        <div class="status-tag">Disponible en plataformas</div>
    </div>

</body>
</html>
