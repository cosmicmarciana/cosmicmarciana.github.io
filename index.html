<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PRÓXIMAMENTE</title>
    <style>
        /* EL FONDO DE TU PLAYER */
        body {
            margin: 0;
            padding: 0;
            background-color: #050303;
            background-image: linear-gradient(180deg, #1a1412 0%, #050303 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif; /* Tipografía normal */
            color: white;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 420px;
        }

        /* EFECTO GLITCH PARA LA PORTADA */
        .glitch-box {
            position: relative;
            width: 100%;
            margin-bottom: 40px;
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
        }

        .portada {
            width: 100%;
            display: block;
            position: relative;
            z-index: 1;
        }

        /* Capas de glitch que se mueven */
        .glitch-box::before,
        .glitch-box::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('portada.jpg') no-repeat center;
            background-size: cover;
            opacity: 0.4;
            z-index: 2;
        }

        .glitch-box::before {
            animation: glitch-vhs 3s infinite linear alternate-reverse;
            clip: rect(10px, 9999px, 30px, 0);
            left: 3px;
        }

        .glitch-box::after {
            animation: glitch-vhs 2s infinite linear alternate;
            clip: rect(60px, 9999px, 80px, 0);
            left: -3px;
        }

        /* TEXTO PRÓXIMAMENTE NORMAL */
        .texto-proximamente {
            font-size: 1.1rem;
            letter-spacing: 10px;
            text-transform: uppercase;
            font-weight: 300; /* Más fino para que sea más elegante */
            opacity: 0.7;
            margin: 0;
        }

        @keyframes glitch-vhs {
            0% { clip: rect(42px, 9999px, 44px, 0); }
            20% { clip: rect(12px, 9999px, 50px, 0); }
            40% { clip: rect(85px, 9999px, 90px, 0); }
            60% { clip: rect(30px, 9999px, 35px, 0); }
            80% { clip: rect(70px, 9999px, 75px, 0); }
            100% { clip: rect(15px, 9999px, 20px, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="glitch-box">
            <img src="portada.jpg" class="portada" alt="Portada">
        </div>
        <p class="texto-proximamente">Próximamente</p>
    </div>

</body>
</html>
