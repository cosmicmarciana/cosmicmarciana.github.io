<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>PRÓXIMAMENTE</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #050303;
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* FONDO ESPIRAL - FIJO Y SIN ERRORES */
        body::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300vmax; 
            height: 300vmax;
            background: repeating-conic-gradient(
                from 0deg,
                #050303 0deg 15deg,
                #1a1412 15deg 30deg
            );
            animation: spiral 30s linear infinite;
            z-index: -1;
            transform: translate(-50%, -50%);
        }

        @keyframes spiral {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .container {
            text-align: center;
            width: 85%;
            max-width: 450px; 
            z-index: 10;
        }

        /* GLITCH TOTAL - NUEVA TÉCNICA QUE NO ROMPE LA IMAGEN */
        .glitch-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 30px;
            box-shadow: 0 0 80px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        .portada {
            width: 100%;
            height: auto;
            display: block;
            /* Aplicamos el glitch directamente sobre la imagen principal */
            animation: glitch-direct 3s infinite;
        }

        h1 {
            font-size: clamp(1.1rem, 4vw, 1.4rem); 
            text-transform: uppercase;
            letter-spacing: 12px;
            margin: 0;
            opacity: 0.7;
            font-weight: normal;
        }

        /* ESTA ANIMACIÓN MUEVE Y "ROMPE" LA IMAGEN SIN NECESITAR COPIAS */
        @keyframes glitch-direct {
            0% { transform: translate(0); filter: none; }
            2% { transform: translate(-5px, 2px); filter: hue-rotate(90deg) brightness(1.2); }
            4% { transform: translate(5px, -2px); filter: hue-rotate(-90deg) contrast(1.5); }
            6% { transform: translate(0); filter: none; }
            /* Saltos repentinos en toda la imagen */
            48% { transform: translate(0); clip-path: inset(0 0 0 0); }
            50% { transform: translate(-10px); clip-path: inset(20% 0 50% 0); }
            52% { transform: translate(10px); clip-path: inset(60% 0 10% 0); }
            54% { transform: translate(0); clip-path: inset(0 0 0 0); }
            100% { transform: translate(0); }
        }

        /* Música al hacer clic */
    </style>
</head>
<body onclick="document.getElementById('musica').play()">

    <div class="container">
        <div class="glitch-wrapper">
            <img src="portada.jpg" class="portada" alt="Portada">
        </div>
        <h1>Próximamente</h1>
    </div>

    <audio id="musica" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

</body>
</html>
