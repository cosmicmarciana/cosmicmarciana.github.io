<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>La Casa del Terror - Próximamente</title>
<style>
  body {
    margin: 0;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .tv-container {
    position: relative;
    width: 100%;
    max-width: 600px; /* Ajusta el tamaño de la tele aquí */
  }

  /* TU TELE (t1.jpg) */
  .tv-frame {
    width: 100%;
    display: block;
    position: relative;
    z-index: 2;
  }

  /* TU PORTADA (portada.jpg) DENTRO DEL HUECO */
  .screen-content {
    position: absolute;
    /* Ajustes para que encaje justo en el cristal de t1.jpg */
    top: 21%; 
    left: 17%;
    width: 64%;
    height: 48%;
    z-index: 1;
    overflow: hidden;
    background: #000;
    border-radius: 50% / 10%; /* Curvatura para imitar el cristal */
  }

  .portada-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.8) contrast(1.2);
  }

  /* Efecto extra de "tele encendida" */
  .overlay {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      rgba(255,255,255,0.03) 0px,
      transparent 2px
    );
    z-index: 3;
    pointer-events: none;
  }
</style>
</head>
<body>

  <div class="tv-container">
    <!-- Capa de la tele -->
    <img src="t1.jpg" class="tv-frame">
    
    <!-- Capa de la portada dentro -->
    <div class="screen-content">
      <img src="portada.jpg" class="portada-img">
      <div class="overlay"></div>
    </div>
  </div>

</body>
</html>
