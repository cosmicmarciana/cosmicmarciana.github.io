<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PRÓXIMAMENTE | La Casa del Terror</title>

<style>
  :root {
    --neon: #00ff00;
    --ink: #eaeaea;
    --blood: #ff2b2b;
  }

  body {
    margin: 0;
    padding: 0;
    background: #050303;
    color: var(--ink);
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* Tu textura de fondo original */
  .bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: linear-gradient(180deg, #1a1412, #0e0a09 50%, #050303);
  }

  .wrap {
    width: 100%;
    max-width: 500px;
    text-align: center;
    padding: 20px;
  }

  /* LA TELEVISIÓN (Tu estructura original) */
  .crt {
    position: relative;
    width: fit-content;
    margin: 0 auto 30px;
    isolation: isolate;
  }

  /* La imagen de la tele vacía (o con la portada) */
  #cover-tv {
    width: 100%;
    max-width: 420px;
    border-radius: 12px;
    display: block;
    filter: drop-shadow(0 0 20px rgba(0,0,0,0.8));
    animation: tv-flicker 4s infinite;
  }

  /* LA PANTALLA VHS (Donde va tu portada) */
  .tv-screen {
    position: absolute;
    left: 17.63%;
    top: 22.75%;
    width: 62.99%;
    height: 46.83%;
    overflow: hidden;
    z-index: 3;
    border-radius: 4px;
    background: #000;
  }

  .portada-vhs {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.8; /* Un poco de transparencia para que el ruido se note más */
    filter: contrast(1.2) brightness(0.9);
  }

  /* Efecto de líneas CRT */
  .tv-screen::before {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(to bottom, rgba(255,255,255,.05) 0px, transparent 2px);
    z-index: 4;
    pointer-events: none;
  }

  /* Glitch de interferencia */
  .vhs-noise {
    position: absolute;
    inset: 0;
    background: url('https://media.giphy.com/media/oEI9uWUicKgS2UzSre/giphy.gif'); /* Ruido estático opcional */
    opacity: 0.1;
    z-index: 5;
    mix-blend-mode: screen;
    pointer-events: none;
  }

  /* Textos */
  .title {
    color: var(--blood);
    font-size: 20px;
    font-weight: 800;
    letter-spacing: .25em;
    text-transform: uppercase;
    margin-bottom: 5px;
    animation: red-flicker 3s infinite;
  }

  .status {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 20px;
    border: 1px solid var(--neon);
    color: var(--neon);
    border-radius: 999px;
    font-size: 12px;
    letter-spacing: 2px;
    box-shadow: 0 0 15px rgba(0,255,0,0.1);
  }

  @keyframes tv-flicker {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(0.98); }
  }

  @keyframes red-flicker {
    0%, 100% { opacity: 1; }
    80% { opacity: 0.8; }
    85% { opacity: 1; text-shadow: 0 0 10px var(--blood); }
  }
</style>
</head>
<body>

<div class="bg"></div>

<div class="wrap">
  
  <div class="crt">
    <!-- Aquí usamos la misma imagen de la TV que ya tienes en tu carpeta -->
    <img src="portada.jpg" id="cover-tv" alt="TV">
    
    <!-- Este es el hueco de la pantalla donde "metemos" la portada -->
    <div class="tv-screen">
      <img src="portada.jpg" class="portada-vhs">
      <div class="vhs-noise"></div>
    </div>
  </div>

  <div class="title">Señal entrante...</div>
  <div class="status">PRÓXIMAMENTE EN PLATAFORMAS</div>

</div>

</body>
</html>
