<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>COSMIC MARCIANA</title>

<style>
body{
  margin:0;
  min-height:100vh;
  background:#000;
  color:white;
  font-family:Arial,sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

#wrap{
  width:90%;
  max-width:650px;
  text-align:center;
}

img{
  width:100%;
  display:block;
  margin:0 auto 28px;
}

.artist{
  font-size:.72rem;
  letter-spacing:7px;
  opacity:.5;
  margin-bottom:14px;
}

.title{
  font-size:1.2rem;
  letter-spacing:8px;
  text-transform:uppercase;
  margin-bottom:26px;
}

button{
  background:transparent;
  color:#ff2b2b;
  border:1px solid rgba(255,43,43,.65);
  padding:13px 30px;
  letter-spacing:5px;
  cursor:pointer;
}

button:hover{
  border-color:#ff2b2b;
}
</style>
</head>

<body>

<div id="wrap">
  <img src="teleroja.webp" alt="">

  <div class="artist">COSMIC MARCIANA</div>
  <div class="title">LA CASA DEL TERROR</div>

  <button id="playBtn">ESCUCHAR</button>
</div>

<audio id="audio">
  <source src="04-la_casa_del_terror.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("audio");
const btn = document.getElementById("playBtn");

btn.addEventListener("click", async () => {
  if(audio.paused){
    await audio.play().catch(()=>{});
    btn.textContent = "DETENER";
  }else{
    audio.pause();
    audio.currentTime = 0;
    btn.textContent = "ESCUCHAR";
  }
});

function stopAudio(){
  audio.pause();
  audio.currentTime = 0;
  btn.textContent = "ESCUCHAR";
}

document.addEventListener("visibilitychange", () => {
  if(document.hidden) stopAudio();
});

window.addEventListener("pagehide", stopAudio);
</script>

</body>
</html>
