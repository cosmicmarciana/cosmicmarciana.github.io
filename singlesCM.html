<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>COSMIC MARCIANA — SEÑAL 01</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  background:#000;
  color:white;
  font-family:Arial,sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow-x:hidden;
  overflow-y:auto;
}

/* fondo rojo muy sutil */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at center, rgba(120,0,0,.20), transparent 60%);
  pointer-events:none;
  z-index:-2;
}

/* scanlines generales */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,.025) 0px,
      rgba(255,255,255,.025) 1px,
      transparent 2px,
      transparent 4px
    );
  opacity:.18;
  pointer-events:none;
  z-index:-1;
}

#wrap{
  width:96%;
  max-width:820px;
  text-align:center;
  padding:22px 0 55px;
}

/* TELE */
.tvWrap{
  position:relative;
  width:100%;
  margin:0 auto 26px;
  overflow:hidden;
}

.tvWrap img{
  width:100%;
  display:block;
  user-select:none;
  pointer-events:none;
}

/* glitch encima de la tele */
.glitchOverlay{
  position:absolute;
  inset:0;
  pointer-events:none;
  opacity:.28;
  mix-blend-mode:screen;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,.08) 0px,
      rgba(255,255,255,.08) 1px,
      transparent 2px,
      transparent 5px
    );
  animation:vhsMove .16s infinite steps(2);
}

.glitchOverlay::before,
.glitchOverlay::after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
}

.glitchOverlay::before{
  background:rgba(255,0,0,.16);
  clip-path:inset(18% 0 72% 0);
  animation:glitchSlice1 1.4s infinite steps(2);
}

.glitchOverlay::after{
  background:rgba(0,180,255,.12);
  clip-path:inset(62% 0 24% 0);
  animation:glitchSlice2 1.1s infinite steps(2);
}

@keyframes vhsMove{
  0%{transform:translate(0,0);}
  25%{transform:translate(2px,-1px);}
  50%{transform:translate(-2px,1px);}
  75%{transform:translate(1px,0);}
  100%{transform:translate(0,0);}
}

@keyframes glitchSlice1{
  0%{clip-path:inset(12% 0 82% 0); transform:translateX(-8px);}
  25%{clip-path:inset(36% 0 52% 0); transform:translateX(6px);}
  50%{clip-path:inset(70% 0 18% 0); transform:translateX(-12px);}
  75%{clip-path:inset(22% 0 68% 0); transform:translateX(10px);}
  100%{clip-path:inset(12% 0 82% 0); transform:translateX(-8px);}
}

@keyframes glitchSlice2{
  0%{clip-path:inset(66% 0 24% 0); transform:translateX(10px);}
  30%{clip-path:inset(8% 0 84% 0); transform:translateX(-6px);}
  60%{clip-path:inset(48% 0 40% 0); transform:translateX(12px);}
  100%{clip-path:inset(66% 0 24% 0); transform:translateX(10px);}
}

/* textos */
.signal{
  font-size:.76rem;
  letter-spacing:6px;
  opacity:.5;
  margin-bottom:14px;
}

.title{
  font-size:1.35rem;
  letter-spacing:8px;
  text-transform:uppercase;
  margin-bottom:26px;
}

/* botón */
button{
  background:transparent;
  color:#ff2b2b;
  border:1px solid rgba(255,43,43,.7);
  padding:13px 32px;
  letter-spacing:5px;
  font-size:.78rem;
  cursor:pointer;
  transition:.25s;
}

button:hover{
  border-color:#ff2b2b;
  background:rgba(255,0,0,.08);
}

@media(max-width:700px){
  #wrap{
    width:100%;
    padding:12px 10px 45px;
  }

  .tvWrap{
    margin-bottom:20px;
  }

  .signal{
    font-size:.68rem;
    letter-spacing:4px;
  }

  .title{
    font-size:1.05rem;
    letter-spacing:5px;
  }
}
</style>
</head>

<body>

<div id="wrap">

  <div class="tvWrap">
    <img src="teleroja.webp" alt="Tele roja Cosmic Marciana">
    <div class="glitchOverlay"></div>
  </div>

  <div class="signal">SEÑAL 01</div>

  <div class="title">LA CASA DEL TERROR</div>

  <button id="playBtn">ESCUCHAR</button>

</div>

<audio id="audio">
  <source src="04-la_casa_del_terror.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("audio");
const btn = document.getElementById("playBtn");

btn.addEventListener("click", async () => {
  if(audio.paused){
    await audio.play().catch(()=>{});
    btn.textContent = "DETENER";
  }else{
    stopAudio();
  }
});

function stopAudio(){
  audio.pause();
  audio.currentTime = 0;
  btn.textContent = "ESCUCHAR";
}

audio.addEventListener("ended", () => {
  btn.textContent = "ESCUCHAR";
});

document.addEventListener("visibilitychange", () => {
  if(document.hidden) stopAudio();
});

window.addEventListener("pagehide", stopAudio);
</script>

</body>
</html>
