<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>COSMIC MARCIANA — SEÑAL 01</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  background:#000;
  color:white;
  font-family:Arial,sans-serif;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  overflow-x:hidden;
}

#wrap{
  width:100%;
  max-width:820px;
  text-align:center;
  padding:8px 12px 40px;
}

.tvCrop{
  position:relative;
  width:100%;
  aspect-ratio:1448/760;
  overflow:hidden;
  margin:0 auto 8px;
}

.tvCrop img{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  display:block;
  user-select:none;
  pointer-events:none;
}

/* glitch dentro de pantalla */
.screenGlitch{
  position:absolute;
  left:33.6%;
  top:21.7%;
  width:36.6%;
  height:33.2%;
  border-radius:7% / 10%;
  overflow:hidden;
  pointer-events:none;
  mix-blend-mode:screen;
}

.screenGlitch span{
  position:absolute;
  left:-8%;
  width:116%;
  height:8%;
  background:rgba(255,255,255,.22);
  opacity:.38;
  animation:glitchBar .7s infinite steps(2);
}

.screenGlitch span:nth-child(1){top:12%; animation-duration:.42s}
.screenGlitch span:nth-child(2){top:34%; animation-duration:.55s}
.screenGlitch span:nth-child(3){top:58%; animation-duration:.48s}
.screenGlitch span:nth-child(4){top:78%; animation-duration:.63s}

.screenGlitch::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,.12) 0px,
      rgba(255,255,255,.12) 1px,
      transparent 2px,
      transparent 4px
    );
  opacity:.45;
  animation:scanMove .11s infinite steps(2);
}

.screenGlitch::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(255,0,0,.18);
  mix-blend-mode:screen;
  opacity:.22;
  animation:rgbShake .16s infinite steps(2);
}

@keyframes glitchBar{
  0%{transform:translateX(-12px) scaleY(.7)}
  25%{transform:translateX(14px) scaleY(1.4)}
  50%{transform:translateX(-22px) scaleY(.9)}
  75%{transform:translateX(18px) scaleY(1.1)}
  100%{transform:translateX(-12px) scaleY(.7)}
}

@keyframes scanMove{
  0%{transform:translateY(0)}
  50%{transform:translateY(3px)}
  100%{transform:translateY(0)}
}

@keyframes rgbShake{
  0%{transform:translate(0,0)}
  33%{transform:translate(4px,-1px)}
  66%{transform:translate(-4px,2px)}
  100%{transform:translate(0,0)}
}

/* textos */
.signal{
  font-size:.78rem;
  letter-spacing:7px;
  opacity:.5;
  margin-bottom:12px;
}

.title{
  font-family:Impact, "Arial Black", sans-serif;
  font-size:2.35rem;
  letter-spacing:10px;
  text-transform:uppercase;
  color:#b91616;
  margin-bottom:24px;
  transform:scaleY(1.25);
}

/* mini player */
.player{
  width:100%;
  max-width:480px;
  margin:0 auto;
  display:flex;
  align-items:center;
  gap:14px;
}

#playBtn{
  width:54px;
  height:54px;
  border-radius:50%;
  background:transparent;
  border:1px solid rgba(255,43,43,.75);
  color:#ff2b2b;
  font-size:1.05rem;
  cursor:pointer;
  flex:0 0 auto;
}

.time{
  font-size:.72rem;
  opacity:.55;
  min-width:42px;
}

.bar{
  position:relative;
  height:4px;
  flex:1;
  background:rgba(255,255,255,.16);
  cursor:pointer;
}

.progress{
  position:absolute;
  left:0;
  top:0;
  height:100%;
  width:0%;
  background:#ff2b2b;
}

@media(max-width:700px){
  #wrap{
    padding-top:4px;
  }

  .tvCrop{
    width:112%;
    margin-left:-6%;
    margin-bottom:0;
  }

  .signal{
    font-size:.68rem;
    letter-spacing:4px;
  }

  .title{
    font-size:1.55rem;
    letter-spacing:5px;
    margin-bottom:22px;
  }

  .player{
    max-width:360px;
    gap:10px;
  }

  #playBtn{
    width:48px;
    height:48px;
  }
}
</style>
</head>

<body>

<div id="wrap">

  <div class="tvCrop">
    <img src="teleroja.webp" alt="Tele roja Cosmic Marciana">
    <div class="screenGlitch">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>

  <div class="signal">SEÑAL 01</div>
  <div class="title">LA CASA DEL TERROR</div>

  <div class="player">
    <button id="playBtn">▶</button>
    <div class="time" id="current">0:00</div>
    <div class="bar" id="bar">
      <div class="progress" id="progress"></div>
    </div>
    <div class="time" id="duration">0:00</div>
  </div>

</div>

<audio id="audio">
  <source src="la-casa-del-terror.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const current = document.getElementById("current");
const duration = document.getElementById("duration");
const progress = document.getElementById("progress");
const bar = document.getElementById("bar");

function formatTime(sec){
  if(!sec || isNaN(sec)) return "0:00";
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60).toString().padStart(2,"0");
  return `${m}:${s}`;
}

playBtn.addEventListener("click", async ()=>{
  if(audio.paused){
    await audio.play().catch(()=>{});
    playBtn.textContent = "❚❚";
  }else{
    audio.pause();
    playBtn.textContent = "▶";
  }
});

audio.addEventListener("loadedmetadata", ()=>{
  duration.textContent = formatTime(audio.duration);
});

audio.addEventListener("timeupdate", ()=>{
  current.textContent = formatTime(audio.currentTime);
  if(audio.duration){
    progress.style.width = `${(audio.currentTime / audio.duration) * 100}%`;
  }
});

audio.addEventListener("ended", ()=>{
  playBtn.textContent = "▶";
  progress.style.width = "0%";
  current.textContent = "0:00";
});

bar.addEventListener("click", e=>{
  if(!audio.duration) return;
  const rect = bar.getBoundingClientRect();
  const pos = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pos * audio.duration;
});

function stopAudio(){
  audio.pause();
  audio.currentTime = 0;
  playBtn.textContent = "▶";
  progress.style.width = "0%";
  current.textContent = "0:00";
}

document.addEventListener("visibilitychange", ()=>{
  if(document.hidden) stopAudio();
});

window.addEventListener("pagehide", stopAudio);
</script>

</body>
</html>
