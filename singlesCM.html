<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>COSMIC MARCIANA — SEÑAL 01</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  background:#000;
  color:white;
  font-family:Arial,sans-serif;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  overflow-x:hidden;
}

#wrap{
  width:100%;
  max-width:820px;
  text-align:center;
  padding:8px 12px 40px;
}

/* recorte para quitar negro sobrante de abajo */
.tvCrop{
  position:relative;
  width:100%;
  aspect-ratio:1448/760;
  overflow:hidden;
  margin:0 auto 10px;
}

.tvCrop img{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  display:block;
  user-select:none;
  pointer-events:none;
}

/* GLITCH SOLO DENTRO DE LA PANTALLA */
.screenGlitch{
  position:absolute;
  left:33.6%;
  top:21.7%;
  width:36.6%;
  height:33.2%;
  border-radius:7% / 10%;
  overflow:hidden;
  pointer-events:none;
  mix-blend-mode:screen;
}

.screenGlitch::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,.12) 0px,
      rgba(255,255,255,.12) 1px,
      transparent 2px,
      transparent 5px
    );
  opacity:.32;
  animation:scan .18s infinite steps(2);
}

.screenGlitch::after{
  content:"";
  position:absolute;
  left:-10%;
  width:120%;
  height:12%;
  top:40%;
  background:rgba(255,255,255,.18);
  opacity:.35;
  animation:tracking 1.7s infinite steps(2);
}

@keyframes scan{
  0%{transform:translateY(0)}
  50%{transform:translateY(3px)}
  100%{transform:translateY(0)}
}

@keyframes tracking{
  0%{top:15%; transform:translateX(-8px)}
  22%{top:48%; transform:translateX(12px)}
  45%{top:72%; transform:translateX(-16px)}
  70%{top:30%; transform:translateX(10px)}
  100%{top:15%; transform:translateX(-8px)}
}

.signal{
  font-size:.74rem;
  letter-spacing:6px;
  opacity:.48;
  margin-bottom:12px;
}

.title{
  font-size:1.35rem;
  letter-spacing:8px;
  text-transform:uppercase;
  color:#d92525;
  margin-bottom:24px;
}

button{
  background:transparent;
  color:#ff2b2b;
  border:1px solid rgba(255,43,43,.75);
  padding:13px 34px;
  letter-spacing:5px;
  font-size:.78rem;
  cursor:pointer;
}

button:hover{
  background:rgba(255,0,0,.08);
}

@media(max-width:700px){
  #wrap{
    padding-top:4px;
  }

  .tvCrop{
    width:112%;
    margin-left:-6%;
    aspect-ratio:1448/760;
    margin-bottom:4px;
  }

  .signal{
    font-size:.68rem;
    letter-spacing:4px;
  }

  .title{
    font-size:1.05rem;
    letter-spacing:5px;
  }
}
</style>
</head>

<body>

<div id="wrap">

  <div class="tvCrop">
    <img src="teleroja.webp" alt="Tele roja Cosmic Marciana">
    <div class="screenGlitch"></div>
  </div>

  <div class="signal">SEÑAL 01</div>
  <div class="title">LA CASA DEL TERROR</div>

  <button id="playBtn">ESCUCHAR</button>

</div>

<audio id="audio">
  <source src="la-casa-del-terror.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("audio");
const btn = document.getElementById("playBtn");

btn.addEventListener("click", async () => {
  if(audio.paused){
    await audio.play().catch(()=>{});
    btn.textContent = "DETENER";
  }else{
    stopAudio();
  }
});

function stopAudio(){
  audio.pause();
  audio.currentTime = 0;
  btn.textContent = "ESCUCHAR";
}

audio.addEventListener("ended", () => {
  btn.textContent = "ESCUCHAR";
});

document.addEventListener("visibilitychange", () => {
  if(document.hidden) stopAudio();
});

window.addEventListener("pagehide", stopAudio);
</script>

</body>
</html>
