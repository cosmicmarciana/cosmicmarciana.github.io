<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>COSMIC MARCIANA — SEÑAL 01</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  background:#000;
  color:white;
  font-family:Arial,sans-serif;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  overflow-x:hidden;
}

/* fondo muy sutil */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at center,
    rgba(120,0,0,.18),
    transparent 60%);
  pointer-events:none;
  z-index:-2;
}

#wrap{
  width:100%;
  max-width:820px;
  text-align:center;
  padding:8px 12px 40px;
}

/* recorte para quitar negro sobrante */
.tvCrop{
  position:relative;
  width:100%;
  aspect-ratio:1448/760;
  overflow:hidden;
  margin:0 auto 10px;
}

.tvCrop img{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  display:block;
  user-select:none;
  pointer-events:none;
}

/* GLITCH SOLO DENTRO DE LA PANTALLA */
.screenGlitch{
  position:absolute;
  left:33.6%;
  top:21.7%;
  width:36.6%;
  height:33.2%;
  border-radius:7% / 10%;
  overflow:hidden;
  pointer-events:none;
  mix-blend-mode:screen;
}

/* scanlines */
.screenGlitch::before{
  content:"";
  position:absolute;
  inset:0;

  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,.10) 0px,
      rgba(255,255,255,.10) 1px,
      transparent 2px,
      transparent 4px
    );

  opacity:.38;

  animation:
    scanMove .12s infinite steps(2),
    flicker .25s infinite;
}

/* glitch agresivo */
.screenGlitch::after{
  content:"";
  position:absolute;
  inset:0;

  background:
    repeating-linear-gradient(
      to bottom,
      transparent 0%,
      rgba(255,255,255,.20) 2%,
      transparent 4%,
      transparent 14%
    );

  opacity:.35;

  animation:
    glitchJump 0.18s infinite steps(2),
    glitchSlices 1.1s infinite steps(2);
}

/* movimiento scanlines */
@keyframes scanMove{
  0%{transform:translateY(0)}
  50%{transform:translateY(2px)}
  100%{transform:translateY(0)}
}

/* flicker CRT */
@keyframes flicker{
  0%{opacity:.32}
  20%{opacity:.42}
  40%{opacity:.28}
  60%{opacity:.45}
  80%{opacity:.30}
  100%{opacity:.38}
}

/* micro saltos */
@keyframes glitchJump{
  0%{transform:translate(0,0)}
  25%{transform:translate(-2px,1px)}
  50%{transform:translate(3px,-1px)}
  75%{transform:translate(-1px,2px)}
  100%{transform:translate(0,0)}
}

/* slices repartidos */
@keyframes glitchSlices{

  0%{
    clip-path:inset(5% 0 82% 0);
  }

  20%{
    clip-path:inset(28% 0 48% 0);
  }

  40%{
    clip-path:inset(62% 0 18% 0);
  }

  60%{
    clip-path:inset(18% 0 66% 0);
  }

  80%{
    clip-path:inset(48% 0 32% 0);
  }

  100%{
    clip-path:inset(5% 0 82% 0);
  }
}

/* textos */
.signal{
  font-size:.74rem;
  letter-spacing:6px;
  opacity:.48;
  margin-bottom:12px;
}

.title{
  font-size:1.35rem;
  letter-spacing:8px;
  text-transform:uppercase;
  color:#d92525;
  margin-bottom:24px;
}

/* botón */
button{
  background:transparent;
  color:#ff2b2b;
  border:1px solid rgba(255,43,43,.75);
  padding:13px 34px;
  letter-spacing:5px;
  font-size:.78rem;
  cursor:pointer;
  transition:.25s;
}

button:hover{
  background:rgba(255,0,0,.08);
}

@media(max-width:700px){

  #wrap{
    padding-top:4px;
  }

  .tvCrop{
    width:112%;
    margin-left:-6%;
    aspect-ratio:1448/760;
    margin-bottom:4px;
  }

  .signal{
    font-size:.68rem;
    letter-spacing:4px;
  }

  .title{
    font-size:1.05rem;
    letter-spacing:5px;
  }
}

</style>
</head>

<body>

<div id="wrap">

  <div class="tvCrop">
    <img src="teleroja.webp" alt="Tele roja Cosmic Marciana">
    <div class="screenGlitch"></div>
  </div>

  <div class="signal">
    SEÑAL 01
  </div>

  <div class="title">
    LA CASA DEL TERROR
  </div>

  <button id="playBtn">
    ESCUCHAR
  </button>

</div>

<audio id="audio">
  <source src="04-la_casa_del_terror.mp3" type="audio/mpeg">
</audio>

<script>

const audio = document.getElementById("audio");
const btn = document.getElementById("playBtn");

btn.addEventListener("click", async () => {

  if(audio.paused){

    await audio.play().catch(()=>{});

    btn.textContent = "DETENER";

  }else{

    stopAudio();
  }

});

function stopAudio(){

  audio.pause();
  audio.currentTime = 0;

  btn.textContent = "ESCUCHAR";
}

audio.addEventListener("ended", () => {

  btn.textContent = "ESCUCHAR";
});

document.addEventListener("visibilitychange", () => {

  if(document.hidden){

    stopAudio();
  }
});

window.addEventListener("pagehide", stopAudio);

</script>

</body>
</html>
