<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EL HOMBRE INVISIBLE — Archivo</title>

<style>

*{
  box-sizing:border-box;
}

html,
body{
  margin:0;
  width:100%;
  min-height:100%;
  background:#000;
  overflow-x:hidden;
}

body{
  color:#e7dfd7;
  font-family:Georgia, serif;
}

/* fondo CRT */

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;

  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,.03) 0px,
      rgba(255,255,255,.03) 1px,
      transparent 2px,
      transparent 4px
    );

  opacity:.45;
  z-index:50;
}

#wrap{
  width:100%;
  max-width:860px;
  margin:0 auto;
  padding:0 16px 80px;
}

/* ========================= */
/* TV */
/* ========================= */

.tvCrop{
  position:relative;
  width:100%;
  aspect-ratio:1448/760;
  overflow:hidden;
  margin:0 auto 28px;
}

.tvCrop img{
  position:absolute;
  inset:0;
  width:100%;
  display:block;
  user-select:none;
  pointer-events:none;
}

/* GLITCH */

.screenGlitch{
  position:absolute;

  left:32.9%;
  top:30%;
  width:36.7%;
  height:46.8%;

  border-radius:9% / 13%;
  overflow:hidden;
  pointer-events:none;
  mix-blend-mode:screen;

  opacity:.95;

  filter:
    contrast(1.6)
    brightness(1.35)
    saturate(1.4);
}

/* scanlines + ruido */

.screenGlitch::before{
  content:"";
  position:absolute;
  inset:-20%;

  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,.24) 0px,
      rgba(255,255,255,.24) 1px,
      transparent 2px,
      transparent 4px
    ),

    repeating-linear-gradient(
      90deg,
      rgba(255,0,0,.20) 0px,
      rgba(255,0,0,.20) 2px,
      rgba(0,255,255,.16) 3px,
      transparent 6px
    );

  opacity:.72;

  animation:
    scanMove .09s infinite steps(2),
    noiseShift .28s infinite steps(3);
}

/* RGB */

.screenGlitch::after{
  content:"";
  position:absolute;
  inset:-8%;

  background:
    linear-gradient(
      90deg,
      rgba(255,0,0,.36),
      rgba(0,255,255,.22),
      rgba(255,255,255,.12)
    );

  mix-blend-mode:screen;
  opacity:.42;

  animation:
    rgbShake .12s infinite steps(2);
}

/* barras */

.screenGlitch span{
  position:absolute;

  left:-18%;
  width:136%;
  height:10%;

  background:rgba(255,255,255,.38);

  opacity:.55;

  mix-blend-mode:screen;

  animation:
    glitchBar .42s infinite steps(2);

  box-shadow:
    0 0 8px rgba(255,255,255,.35),
    16px 0 0 rgba(255,0,0,.22),
    -16px 0 0 rgba(0,255,255,.22);
}

.screenGlitch span:nth-child(1){ top:6%; animation-duration:.31s; }
.screenGlitch span:nth-child(2){ top:22%; animation-duration:.46s; }
.screenGlitch span:nth-child(3){ top:39%; animation-duration:.27s; }
.screenGlitch span:nth-child(4){ top:57%; animation-duration:.38s; }
.screenGlitch span:nth-child(5){ top:74%; animation-duration:.52s; }
.screenGlitch span:nth-child(6){ top:88%; animation-duration:.34s; }

@keyframes glitchBar{
  0%{ transform:translateX(-22px) scaleY(.5); }
  20%{ transform:translateX(28px) scaleY(1.7); }
  40%{ transform:translateX(-36px) scaleY(.8); }
  60%{ transform:translateX(42px) scaleY(1.25); }
  80%{ transform:translateX(-18px) scaleY(2); }
  100%{ transform:translateX(-22px) scaleY(.5); }
}

@keyframes scanMove{
  0%{ transform:translateY(0); }
  50%{ transform:translateY(7px); }
  100%{ transform:translateY(0); }
}

@keyframes noiseShift{
  0%{ background-position:0 0, 0 0; }
  50%{ background-position:0 13px, 17px 0; }
  100%{ background-position:0 0, 0 0; }
}

@keyframes rgbShake{
  0%{ transform:translate(0,0) skewX(0deg); }
  25%{ transform:translate(8px,-2px) skewX(3deg); }
  50%{ transform:translate(-10px,3px) skewX(-4deg); }
  75%{ transform:translate(5px,1px) skewX(2deg); }
  100%{ transform:translate(0,0) skewX(0deg); }
}

/* ========================= */
/* TEXTOS */
/* ========================= */

.signal{
  text-align:center;
  font-size:.72rem;
  letter-spacing:6px;
  opacity:.42;
  margin-bottom:12px;
}

.title{
  text-align:center;

  font-family:Impact, "Arial Black", sans-serif;

  font-size:clamp(2.2rem,8vw,4.5rem);

  letter-spacing:8px;

  text-transform:uppercase;

  color:#b91616;

  margin-bottom:16px;

  transform:scaleY(1.18);

  text-shadow:
    2px 0 rgba(0,255,120,.18),
    -2px 0 rgba(255,0,0,.2),
    0 0 18px rgba(255,0,0,.18);
}

.subtitle{
  text-align:center;

  font-size:.82rem;

  letter-spacing:5px;

  opacity:.5;

  margin-bottom:48px;

  text-transform:uppercase;

  font-family:Arial,sans-serif;
}

/* ========================= */
/* TEXTO LIBRO */
/* ========================= */

.book{
  max-width:720px;
  margin:0 auto;
}

.book p{
  font-size:clamp(1.08rem,2vw,1.2rem);
  line-height:1.9;
  margin:0 0 1.4em;
  color:#e7dfd7;
}

.book p:first-child::first-letter{
  font-size:2.6em;
  line-height:.8;
  float:left;
  padding-right:6px;
  color:#ff2b2b;
}

.separator{
  width:100%;
  height:1px;

  margin:44px auto;

  background:
    linear-gradient(
      90deg,
      transparent,
      rgba(255,43,43,.7),
      transparent
    );
}

/* MÓVIL */

@media(max-width:700px){

  #wrap{
    padding-left:14px;
    padding-right:14px;
    padding-bottom:60px;
  }

  .tvCrop{
    width:138%;
    margin-left:-19%;
    margin-bottom:18px;
  }

  .signal{
    font-size:.62rem;
    letter-spacing:4px;
  }

  .title{
    font-size:1.7rem;
    letter-spacing:4px;
  }

  .subtitle{
    font-size:.7rem;
    letter-spacing:3px;
    margin-bottom:34px;
  }

  .book p{
    line-height:1.82;
  }
}

</style>
</head>

<body>

<div id="wrap">

  <!-- TV -->

  <div class="tvCrop">

    <img src="teleroja.webp" alt="Tele roja Cosmic Marciana">

    <div class="screenGlitch">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>

  </div>

  <!-- TEXTOS -->

  <div class="signal">
    ARCHIVO RECUPERADO
  </div>

  <div class="title">
    EL HOMBRE INVISIBLE
  </div>

  <div class="subtitle">
    fragmento del capítulo · la casa del terror
  </div>

  <div class="separator"></div>

  <!-- TEXTO DEL LIBRO -->

  <section class="book">

    <!-- PEGA AQUÍ TU TEXTO -->

    <p>
      Aquí pegas el primer párrafo del fragmento.
    </p>

    <p>
      Y aquí el segundo.
    </p>

    <p>
      Y así sucesivamente.
    </p>

    <!-- FIN -->

  </section>

</div>

</body>
</html>
